<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe App Flow</title>
    <style>
        /* --- Base & Reset (Keeping it simple for flow demo) --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: #F8F8F8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Simulates a phone frame */
        .phone-frame {
            width: 375px; height: 812px; background: white; border-radius: 40px; border: 12px solid #333; overflow: hidden; position: relative;
        }

        /* --- Consistant Header Component (Static across pages) --- */
        .static-header {
            position: absolute; top: 0; left: 0; width: 100%; z-index: 10; padding: 16px; display: flex; align-items: center; justify-content: center; background: white;
        }
        .header-main-title { font-size: 20px; font-weight: bold; position: relative; }
        .back-btn { position: absolute; left: 16px; cursor: pointer; display: none; /* Hidden on master */ }
        .menu-btn { position: absolute; right: 16px; cursor: pointer; font-size: 1.2rem; }
        .status-bar-time { position: absolute; top: 18px; left: 24px; font-weight: 600; font-size: 13px; }
        /* Dynamic Island placeholder */
        .dynamic-island { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: black; border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; }

        /* --- Dynamic Content Area --- */
        #app-content { height: 100%; padding-top: 60px; /* Offset for static header */ }

        /* Common black pill element */
        .black-pill-container { background: black; color: white; border-radius: 100px; padding: 12px 20px; margin: 20px 16px; display: flex; align-items: center; gap: 8px; font-size: 1rem; }
        .pill-text { font-weight: bold; }
        .pill-tag { background: white; color: black; border-radius: 100px; padding: 6px 14px; font-size: 0.9rem; font-weight: 500; }

        /* --- Master Page Styles --- */
        .recipe-grid { padding: 0 16px; display: grid; gap: 16px; }
        .recipe-card { background: #EEE; border-radius: 16px; overflow: hidden; cursor: pointer; transition: background 0.2s; }
        .recipe-card:hover { background: #E0E0E0; }
        .recipe-card img { width: 100%; height: 160px; object-fit: cover; }
        .recipe-card-title { padding: 12px; font-weight: bold; font-size: 1rem; }

        /* --- Detail Page Styles --- */
        .detail-page-wrapper { padding: 0 16px 40px; }
        .section-title { font-size: 1rem; font-weight: bold; margin-bottom: 12px; }
        .detail-content-block { background: #EEE; border-radius: 20px; padding: 20px; font-size: 0.95rem; line-height: 1.5; color: #444; }
        .detail-content-block p { margin-bottom: 16px; }
        .source-link { font-size: 0.75rem; color: #888; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="static-header">
            <div class="dynamic-island"></div>
            <span class="status-bar-time">9:41</span>
            <span id="header-back-btn" class="back-btn">&lsaquo;</span>
            <span id="app-current-view-title" class="header-main-title">All Recipes</span>
            <span id="header-menu-btn" class="menu-btn">&#9776;</span>
        </div>

        <div id="app-content">
            </div>
    </div>

    <script>
        // --- View Definitions (HTML templates as strings) ---

        const views = {
            // Master View: A grid of selectable recipes
            'master': `
                <div class="black-pill-container">
                    <span class="pill-text">Show Recipes:</span>
                    <span class="pill-tag">Quick & Easy</span>
                </div>
                <div class="recipe-grid">
                    <div class="recipe-card" data-recipe-id="tomato-soup">
                        <img src="tomato-soup-thumbnail.jpg" alt="Tomato Soup">
                        <div class="recipe-card-title">Classic Tomato Soup</div>
                    </div>
                    <div class="recipe-card" data-recipe-id="hamburger">
                        <img src="https://via.placeholder.com/200x160?text=Hamburger" alt="Hamburger">
                        <div class="recipe-card-title">Gourmet Burger</div>
                    </div>
                </div>
            `,

            // Detail View (This is image_1.png)
            'tomato-soup-detail': `
                <div class="black-pill-container">
                    <span class="pill-text">For</span>
                    <span class="pill-tag">Tomato soup</span>
                </div>
                <div class="detail-page-wrapper">
                    <div class="section-title">Do you know..?</div>
                    <div class="detail-content-block">
                        <p>The first published recipe for tomato soup appeared in N. K. M. Lee's The Cook's Own Book in 1832.</p>
                        <p>Depending on the recipe, tomato soup is generally low in calories and high in potassium and vitamins C, K, and A. It is also rich in lycopene...</p>
                        <p>A simple tomato soup can be prepared simply with ingredients such as canned tomatoes/tomatoes, onion, garlic...</p>
                        <p>Fresh tomatoes are recommended to use only when they are very ripe, because the ripeness plays a crucial role in the depth of the flavour.</p>
                        <span class="source-link">from https://en.wikipedia.org/wiki/Tomato_soup</span>
                    </div>
                </div>
            `
        };

        // --- Core Page Navigation Functions ---

        const contentContainer = document.getElementById('app-content');
        const headerTitle = document.getElementById('app-current-view-title');
        const backBtn = document.getElementById('header-back-btn');

        // Function: Switch to the master page
        function showMasterPage() {
            // 1. Swap the visible content
            contentContainer.innerHTML = views.master;
            
            // 2. Update the static header state
            headerTitle.textContent = "All Recipes";
            backBtn.style.display = 'none';

            // 3. Re-bind click listeners to the *newly created* master elements
            bindMasterEventListeners();
        }

        // Function: Switch to a specific recipe detail page (image_1.png)
        function showDetailPage(recipeId) {
            if (views[recipeId + '-detail']) {
                // 1. Swap the visible content
                contentContainer.innerHTML = views[recipeId + '-detail'];
                
                // 2. Update the header title and add the back button
                // (Note: The '~' in your image title is preserved here)
                headerTitle.innerHTML = recipeId === 'tomato-soup' ? 'History story~' : 'History story~';
                backBtn.style.display = 'block';
            }
        }

        // --- Event Listener Binding Functions ---

        // Bind clicks to the recipe cards on the Master view
        function bindMasterEventListeners() {
            const recipeCards = document.querySelectorAll('.recipe-card');
            recipeCards.forEach(card => {
                card.addEventListener('click', (event) => {
                    // Extract the ID defined in the HTML `data-recipe-id` attribute
                    const selectedRecipeId = card.getAttribute('data-recipe-id');
                    showDetailPage(selectedRecipeId);
                });
            });
        }

        // Handle the Back button click
        backBtn.addEventListener('click', showMasterPage);

        // --- Initial App Load ---
        showMasterPage();

    </script>
</body>
</html>
